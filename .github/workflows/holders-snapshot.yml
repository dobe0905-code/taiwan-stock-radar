name: Holders Weekly Snapshot

on:
  schedule:
    # 每週五 22:00 台北時間 = 14:00 UTC（TDCC 約 18:00 更新，22:00 抓較穩）
    - cron: '0 14 * * FRI'
  workflow_dispatch:
    inputs:
      limit:
        description: '只抓前 N 檔（測試用，留空=全部）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run snapshot
        env:
          LIMIT: ${{ github.event.inputs.limit }}
        run: node scripts/snapshot-holders.js

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/holders_history/
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          WEEK=$(date -u -d 'now' +'%Y-W%V')
          git commit -m "chore(holders): weekly snapshot ${WEEK}"
          git push
